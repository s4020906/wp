<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Add Pet</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="assets/css/styles.css">
    </head>

    <body>

        <!-- NAVBAR -->
         <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container">
                <a class="navbar-brand" href="index.html">🐾 PetConnect</a>

                <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="pets.html">Browse Pets</a></li>
                        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                        <li class="nav-item"><a class="nav-link active btn btn-pink text-white px-3 ms-2" href="#">Add Pet</a></li>
                    </ul>
                </div>
            </div>
         </nav>

         <!-- MAIN -->
          <main class="container my-5">

            <h2 class="page-title">➕ Add a New Pet for Adoption</h2>

            <div class="form-box">

                <form>

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">Pet Name *</label>
                            <input type="text" class="form-control" placeholder="Enter pet name">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Species *</label>
                            <select class="form-select">
                                <option>Select species</option>
                                <option>Dog</option>
                                <option>Cat</option>
                                <option>Bird</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Breed</label>
                            <input type="text" class="form-control" placeholder="Enter breed">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Age (Years)</label>
                            <input type="number" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Age (Months)</label>
                            <input type="number" class="form-control">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Gender *</label>
                            <select class="form-select">
                                <option>Select gender</option>
                                <option>Male</option>
                                <option>Female</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Size *</label>
                            <select class="form-select">
                                <option>Select size</option>
                                <option>Small</option>
                                <option>Medium</option>
                                <option>Large</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Adoption Fee ($) *</label>
                            <input type="number" class="form-control" placeholder="Enter fee">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Description *</label>
                            <textarea class="form-control" rows="3"
                            placeholder="Describe the pet's personality and characteristics"></textarea>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Health Information</label>
                            <textarea class="form-control" rows="2"
                            placeholder="Enter health and vaccination information"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Status *</label>
                            <select class="form-select">
                                <option>Select status</option>
                                <option>Available</option>
                                <option>Pending</option>
                                <option>Adopted</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Pet Photo</label>
                            <input type="file" class="form-control">
                        </div>

                    </div>

                    <div class="mt-4">
                        <button class="btn btn-purple">Add Pet</button>
                        <button class="btn btn-pink">Cancel</button>
                    </div>

                </form>

            </div>
          </main>

          <footer class="site-footer">
            <p>&copy; 2026 s4020906. Connecting pets with loving homes.</p>
          </footer>
          
    </body>
</html>
